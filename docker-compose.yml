name: bible-reader

services:

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bible_reader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: sh -c "echo 'CREATE EXTENSION IF NOT EXISTS vector;' | npx prisma db execute --schema=packages/db/prisma/schema.prisma --stdin && npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bible_reader
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./packages:/app/packages

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: npm run dev --workspace=apps/api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bible_reader
      EMBEDDING_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: npm run dev --workspace=apps/web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      NEXT_PUBLIC_API_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bible_reader
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/app:/app/apps/web/app
      - ./apps/web/components:/app/apps/web/components
      - ./packages:/app/packages
    depends_on:
      - api

volumes:
  postgres_data: